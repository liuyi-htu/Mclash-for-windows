name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true
        default: v1.0.2

permissions:
  contents: write

jobs:
  windows-release:
    name: Build Windows installer
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: windows-service/go.mod
          cache-dependency-path: windows-service/go.sum

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: powershell
        run: ./scripts/build-windows.ps1

      - name: Create checksum
        shell: powershell
        run: |
          $installer = "installer/Output/Mclash-Windows-Setup-1.0.2.exe"
          $hash = (Get-FileHash -LiteralPath $installer -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  Mclash-Windows-Setup-1.0.2.exe" |
            Set-Content -LiteralPath "$installer.sha256" -Encoding ascii

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Mclash 1.0.2
          generate_release_notes: true
          files: |
            installer/Output/Mclash-Windows-Setup-1.0.2.exe
            installer/Output/Mclash-Windows-Setup-1.0.2.exe.sha256
