name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the v prefix (for example, 1.0.3)
        required: true
        type: string

permissions:
  contents: write

jobs:
  windows-release:
    name: Build Windows installer
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: windows-service/go.mod
          cache-dependency-path: windows-service/go.sum

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Prepare release version
        shell: powershell
        run: |
          $version = "${{ inputs.version }}".Trim()
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Version must use the x.y.z format without a v prefix."
          }
          "MCLASH_VERSION=$version" >> $env:GITHUB_ENV
          "RELEASE_TAG=v$version" >> $env:GITHUB_ENV
          "INSTALLER_NAME=Mclash-Windows-Setup-$version.exe" >> $env:GITHUB_ENV
          (Get-Content -LiteralPath "mclash/pubspec.yaml" -Raw) `
            -replace '(?m)^version:\s*.*$', "version: $version" |
            Set-Content -LiteralPath "mclash/pubspec.yaml" -Encoding utf8

      - name: Build installer
        shell: powershell
        run: ./scripts/build-windows.ps1

      - name: Create checksum
        shell: powershell
        run: |
          $installer = "installer/Output/$env:INSTALLER_NAME"
          $hash = (Get-FileHash -LiteralPath $installer -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $env:INSTALLER_NAME" |
            Set-Content -LiteralPath "$installer.sha256" -Encoding ascii

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Mclash ${{ env.MCLASH_VERSION }}
          generate_release_notes: true
          files: |
            installer/Output/${{ env.INSTALLER_NAME }}
            installer/Output/${{ env.INSTALLER_NAME }}.sha256
