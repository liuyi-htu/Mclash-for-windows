#替换掉98行的机场订阅链接
mixed-port: 7890
redir-port: 7891
tproxy-port: 1536
ipv6: false
mode: rule
allow-lan: false
bind-address: "127.0.0.1"

# 稳定性设置
disable-keep-alive: false
keep-alive-idle: 15
keep-alive-interval: 15
unified-delay: true
tcp-concurrent: true
log-level: error
find-process-mode: "off"

# 保存每个 APP 策略组的节点选择
profile:
  store-selected: true
  store-fake-ip: true

geo-auto-update: true
geo-update-interval: 24
external-controller: 127.0.0.1:9090
external-ui: WebUI/ZashBoard
external-ui-url: "https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip"
external-controller-cors:
  allow-origins:
  - "*"
  allow-private-network: true

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
    TLS:
      ports: [443, 5228, 8443]
    QUIC:
      ports: [443, 8443]

# TUN 模式：默认关闭，需要时在面板中开启
tun:
  enable: false
  device: Meta
  stack: mixed
  dns-hijack:
    - any:53
    - tcp://any:53
  udp-timeout: 300
  auto-route: true
  strict-route: true
  auto-redirect: false
  auto-detect-interface: true

dns:
  enable: true
  ipv6: false
  prefer-h3: false
  cache-algorithm: arc

  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  use-hosts: true
  use-system-hosts: true

  fake-ip-filter:
    - "rule-set:private_domain"
    
  # 用于解析 DoH 服务器自身的域名
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    
    
  # 普通域名默认使用国内 DoH
  nameserver: &cn_doh
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

  nameserver-policy:
      
    "geosite:cn,private,apple-cn,microsoft@cn": *cn_doh

    "geosite:geolocation-!cn":
      - "https://1.1.1.1/dns-query#RULES"
      - "https://8.8.8.8/dns-query#RULES"

proxy-providers:
  机场:
    type: http
    url: "机场订阅链接"
    path: ./profiles/机场.yaml
    interval: 43200
    health-check:
      enable: true
      interval: 3600
      url: "https://www.gstatic.com/generate_204"
      timeout: 3000

proxy-groups:
- name: 🚀 国内
  type: select
  proxies: [DIRECT]
  use: [机场]
  filter: "(?i)(CN)"
  exclude-filter: "(?i)(剩余流量|流量剩余|套餐流量|到期时间|到期日期|有效期|过期时间|官网|客服|公告|Traffic Remaining|Expire|Expiry)"
- &foreign_group
  name: 🌍 国外
  type: select
  use: [机场]
  filter: "(?i)(香港|澳门|台湾|新加坡|日本|美国|德国|英国|加拿大|澳大利亚|Hong Kong|Macao|Taiwan|Singapore|Japan|United States|Germany|United Kingdom|Canada|Australia|(^|[^A-Za-z])(HK|MO|TW|SG|JP|US|DE|UK|GB|CA|AU)([^A-Za-z]|$))"
  exclude-filter: "(?i)(剩余流量|流量剩余|套餐流量|到期时间|到期日期|有效期|过期时间|官网|客服|公告|Traffic Remaining|Expire|Expiry)"
- &app_group
  <<: *foreign_group
  name: 🤖 OpenAI
  proxies: [🌍 国外]
  use: [机场]
  filter: "(?i)(香港|澳门|台湾|新加坡|日本|美国|德国|英国|加拿大|澳大利亚|Hong Kong|Macao|Taiwan|Singapore|Japan|United States|Germany|United Kingdom|Canada|Australia|(^|[^A-Za-z])(HK|MO|TW|SG|JP|US|DE|UK|GB|CA|AU)([^A-Za-z]|$))"
  exclude-filter: "(?i)(剩余流量|流量剩余|套餐流量|到期时间|到期日期|有效期|过期时间|官网|客服|公告|Traffic Remaining|Expire|Expiry)"

- <<: *app_group
  name: 🧠 Claude

- <<: *app_group
  name: 💎 Gemini

- <<: *app_group
  name: 📺 YouTube

- <<: *app_group
  name: ✈️ Telegram

- <<: *app_group
  name: 🐦 X-Twitter

- <<: *app_group
  name: 📷 Instagram

- <<: *app_group
  name: 🎮 Discord

- <<: *app_group
  name: 🎬 Netflix

- <<: *app_group
  name: 🎵 Spotify

- <<: *app_group
  name: 🐙 GitHub

- <<: *app_group
  name: 🔍 Google

- <<: *app_group
  name: 🍎 Apple
  proxies: [DIRECT, 🌍 国外]
- <<: *app_group
  name: 📱 TikTok


rule-anchor:
  domain: &domain
    type: http
    behavior: domain
    format: mrs
    interval: 86400
    proxy: 🌍 国外
  ip: &ip
    type: http
    behavior: ipcidr
    format: mrs
    interval: 86400
    proxy: 🌍 国外

