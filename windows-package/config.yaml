- RULE-SET,youtube_domain,📺 YouTube
- RULE-SET,netflix_domain,🎬 Netflix
- RULE-SET,spotify_domain,🎵 Spotify
- RULE-SET,telegram_domain,✈️ Telegram
- RULE-SET,telegram_ip,✈️ Telegram,no-resolve
- RULE-SET,instagram_domain,📷 Instagram
- RULE-SET,discord_domain,🎮 Discord
- RULE-SET,twitter_domain,🐦 X-Twitter
- RULE-SET,twitter_ip,🐦 X-Twitter,no-resolve
- RULE-SET,github_domain,🐙 GitHub
- RULE-SET,tiktok_domain,📱 TikTok
- RULE-SET,google_domain,🔍 Google
- RULE-SET,netflix_ip,🎬 Netflix,no-resolve
- RULE-SET,cn_domain,🚀 国内
- RULE-SET,cn_ip,🚀 国内,no-resolve
- MATCH,🌍 国外
